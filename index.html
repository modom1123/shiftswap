function getMondayKey(date) {
  var d = new Date(date || Date.now());
  var day = d.getDay();
  var diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}

function fmtWeekLabel(key) {
  var d = new Date(key + "T12:00:00");
  var sun = new Date(d); sun.setDate(d.getDate() + 6);
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[d.getMonth()] + " " + d.getDate() + " - " + months[sun.getMonth()] + " " + sun.getDate();
}

function parseTime(t) { const [h,m] = t.split(":").map(Number); return h + m/60; }
function shiftHours(s) { if (!s) return 0; const [a,b] = s.split("-"); return parseTime(b) - parseTime(a); }

function fmt12(t) {
  if (!t || typeof t !== "string") return "";
  var parts = t.split(":");
  if (parts.length < 2) return t;
  var h = Number(parts[0]);
  var m = Number(parts[1]);
  if (isNaN(h) || isNaN(m)) return t;
  var ampm = h >= 12 ? "pm" : "am";
  var hr = h % 12 || 12;
  return m === 0 ? (hr + ampm) : (hr + ":" + String(m).padStart(2,"0") + ampm);
}

function fmtShift(s) {
  if (!s || typeof s !== "string") return "OFF";
  var parts = s.split("-");
  if (parts.length < 2) return s;
  var fa = fmt12(parts[0].trim());
  var fb = fmt12(parts[1].trim());
  if (!fa || !fb) return s;
  return fa + "-" + fb;
}

function diffInfo(a, b) {
  const d = shiftHours(b) - shiftHours(a);
  if (d === 0) return { label:"Equal swap",    color:P.monetPonds, bg:P.limeade + "55"    };
  if (d  > 0)  return { label:"+" + d + "h for you", color:"#8B6914", bg:P.pureSun + "55" };
  return             { label:d + "h for you",  color:P.tomatoJam, bg:P.peonyBundle + "88" };
}

function isOpt(rk) { return rk === "OPTICIAN" || ROLES[rk]?.secondary === "Optician"; }

function Avatar({ initials, roleKey, size }) {
  const sz = size || 36;
  const r = ROLES[roleKey] || ROLES.SALES_ADVISOR;
  return (
    <div style={{width:sz,height:sz,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*0.3,fontWeight:900,background:r.bg,color:r.text,fontFamily:"monospace"}}>
      {initials}
    </div>
  );
}

function Pill({ roleKey, mini }) {
  const r = ROLES[roleKey] || ROLES.SALES_ADVISOR;
  return (
    <span style={{background:r.bg,color:r.text,fontSize:mini?8:10,fontWeight:800,padding:mini?"1px 5px":"2px 8px",borderRadius:5,fontFamily:"monospace",display:"inline-flex",alignItems:"center",gap:3,flexShrink:0}}>
      {r.short}
      {r.secondary && !mini && <span style={{opacity:.55,fontWeight:500}}>+opt</span>}
    </span>
  );
}

function DiffBadge({ shiftA, shiftB }) {
  const d = diffInfo(shiftA, shiftB);
  return (
    <span style={{background:d.bg,color:d.color,fontSize:10,fontWeight:800,padding:"3px 8px",borderRadius:6,fontFamily:"monospace",flexShrink:0}}>

}

function ReqCard({ req, team, currentUser, onRespond, isOwn }) {
  const [open, setOpen] = useState(false);
  const requester = team.find(function(m){ return m.id === req.requesterId; });
  const myShift = currentUser.schedule[req.day];
  const alreadyOffered = req.offers && req.offers.find(function(o){ return o.offererId === currentUser.id; });
  const hrs = shiftHours(req.requesterShift);

  return (
    <div style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 12px rgba(43,33,24,.08)",border:"1.5px solid " + P.cream}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",cursor:"pointer"}} onClick={function(){ setOpen(!open); }}>
        <Avatar initials={requester.avatar} roleKey={requester.role} />
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontWeight:900,fontSize:14,color:P.ink}}>{requester.name}</span>
            <Pill roleKey={requester.role} />
          </div>
          <div style={{fontSize:11,color:P.softInk,marginTop:2}}>
            {req.type === "COVER" ? "Full cover" : "Swap"} {req.day} {fmtShift(req.requesterShift)} ({hrs}h)

        </div>
        <div style={{background:req.type === "COVER" ? P.pureSun + "44" : P.airplaneView + "44",color:req.type === "COVER" ? "#8B6914" : P.tropicalRain,fontSize:9,fontWeight:800,padding:"4px 9px",borderRadius:6,fontFamily:"monospace",flexShrink:0}}>
          {req.type}
        </div>
        <span style={{color:"#ccc",fontSize:12,marginLeft:2}}>{open ? "▲" : "▼"}</span>
      </div>

      {open && (
        <div style={{borderTop:"1.5px solid " + P.cream,padding:"14px 16px",background:P.cream + "88",display:"flex",flexDirection:"column",gap:12}}>
          {req.note && (
            <div style={{fontSize:12,color:P.softInk,fontStyle:"italic"}}>"{req.note}"</div>
          )}
          {req.offers && req.offers.length > 0 && (
            <div>
              <SLabel small>Offers</SLabel>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {req.offers.map(function(offer, i){
                  const offerer = team.find(function(m){ return m.id === offer.offererId; });
                  return (
                    <div key={i} style={{background:"#fff",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,border:"1.5px solid " + P.cream}}>
                      <Avatar initials={offerer && offerer.avatar} roleKey={offerer && offerer.role} size={28} />
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:800,fontSize:13,color:P.ink}}>{offerer && offerer.name}</div>
                        <div style={{fontSize:11,color:P.softInk,fontFamily:"monospace"}}>{fmtShift(offer.offeredShift)}</div>
                      </div>
                      <DiffBadge shiftA={req.requesterShift} shiftB={offer.offeredShift} />
                      {isOwn && (
                        <button onClick={function(){ onRespond("accept", req.id, offer); }} style={{background:P.tropicalRain,color:"#fff",border:"none",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:800,cursor:"pointer",flexShrink:0}}>
                          Accept
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {!isOwn && !alreadyOffered && req.type === "SWAP" && myShift && (

              <div style={{flex:1}}>

              You responded

          )}
        </div>
      )}

}

function FindScreen({ team, currentUser, onCreateRequest }) {
  const [findMode,  setFindMode] = useState(null);      // "manager" | "me"
  const [subjectId, setSubjectId] = useState(null);     // who needs coverage (manager mode)
  const [selDay,    setSelDay]   = useState(null);
  const [selType,   setSelType]  = useState(null);
  const [note,      setNote]     = useState("");
  const [posted,    setPosted]   = useState(false);

  // In manager mode, subject is whoever we selected; in me mode, it's currentUser
  var subject = findMode === "manager" && subjectId
    ? team.find(function(m){ return m.id === subjectId; })
    : currentUser;

  var subjectShift = (selDay && subject) ? ((subject.schedule||{})[selDay] || null) : null;

  var suggestions = (selDay && selType && subject)
    ? team
        .filter(function(m){
          if (m.id === subject.id) return false;
          var s = (m.schedule||{})[selDay];
          return selType === "COVER" ? !s : !!s;
        })
        .map(function(m){
          var roleMatch = m.role === subject.role;
          var optMatch  = isOpt(subject.role) ? isOpt(m.role) : true;
          return Object.assign({}, m, {theirShift:(m.schedule||{})[selDay], score:(roleMatch?2:0)+(optMatch?1:0), roleMatch:roleMatch});
        })
        .sort(function(a,b){ return b.score - a.score; })
    : [];

  function reset() { setPosted(false); setSelDay(null); setSelType(null); setNote(""); setSubjectId(null); }

  if (posted) {
    return (
      <div style={{padding:"48px 24px",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>

  return (

            <div style={{fontSize:26,marginBottom:8}}>🧑‍💼</div>
            <div style={{fontWeight:900,fontSize:14,color:P.ink}}>As a Manager</div>
            <div style={{fontSize:11,color:P.softInk,marginTop:4,lineHeight:1.4}}>Find coverage for any team member's call-out</div>
          </div>
          <div onClick={function(){ setFindMode("me"); setSelDay(null); setSelType(null); setSubjectId(null); }} style={{borderRadius:16,padding:"18px 14px",cursor:"pointer",border:"2.5px solid "+(findMode==="me"?P.tropicalRain:P.cream),background:findMode==="me"?P.tropicalRain+"12":"#fff",transition:"all .15s",boxShadow:findMode==="me"?"0 0 0 2px "+P.tropicalRain+"25":"0 2px 8px rgba(43,33,24,.06)"}}>

          </div>

var HOUR_OPTIONS = [];
for (var _h = 6; _h <= 23; _h++) {
  var _ap = _h >= 12 ? "pm" : "am";
  var _hr = _h % 12 || 12;
  HOUR_OPTIONS.push({ val: _h + ":00", label: _hr + ":00" + _ap });
  HOUR_OPTIONS.push({ val: _h + ":30", label: _hr + ":30" + _ap });
}

function ShiftEditor({ value, onChange, onClear }) {
  var parts = value ? value.split("-") : ["9:00","17:00"];
  var startVal = value ? parts[0] : "";
  var endVal   = value ? parts[1] : "";

  function handleStart(e) {
    var s = e.target.value;
    var end = endVal || "17:00";
    if (parseTime(end) <= parseTime(s)) {
      var idx = HOUR_OPTIONS.findIndex(function(o){ return o.val === s; });
      end = idx < HOUR_OPTIONS.length - 1 ? HOUR_OPTIONS[idx+2].val : end;
    }
    onChange(s + "-" + end);
  }
  function handleEnd(e) {
    var end = e.target.value;
    var start = startVal || "9:00";
    if (parseTime(end) <= parseTime(start)) return;
    onChange(start + "-" + end);
  }

  var selStyle = {border:"1.5px solid " + P.cream, borderRadius:8, padding:"7px 6px", fontSize:12, background:"#fafafa", color:P.ink, outline:"none", flex:1};

  return (
    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6}}>
      <select value={startVal} onChange={handleStart} style={selStyle}>
        <option value="">start</option>
        {HOUR_OPTIONS.slice(0, HOUR_OPTIONS.length-2).map(function(o){
          return <option key={o.val} value={o.val}>{o.label}</option>;
        })}
      </select>
      <span style={{color:P.softInk,fontSize:11,flexShrink:0}}>to</span>
      <select value={endVal} onChange={handleEnd} style={selStyle}>
        <option value="">end</option>
        {HOUR_OPTIONS.slice(2).map(function(o){
          return <option key={o.val} value={o.val}>{o.label}</option>;
        })}
      </select>
      {value && (
        <button onClick={onClear} style={{background:P.peonyBundle+"88",border:"none",borderRadius:7,padding:"7px 9px",fontSize:12,cursor:"pointer",color:P.tomatoJam,fontWeight:800,flexShrink:0}}>
          Off
        </button>
      )}
    </div>
  );
}

async function parseImage(base64, mediaType, apiKey) {
  var res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model:"claude-sonnet-4-5",
      max_tokens:4000,
      messages:[{role:"user",content:[
        {type:"image", source:{type:"base64",media_type:mediaType,data:base64}},
        {type:"text",  text:"Extract the weekly work schedule from this image. Return ONLY a valid JSON array. No explanation, no markdown, no code fences. Use double-quoted keys and string values. Format: [{\"name\":\"Full Name\",\"Mon\":\"09:00-17:00\",\"Tue\":null,\"Wed\":\"09:00-17:00\",\"Thu\":null,\"Fri\":null,\"Sat\":null,\"Sun\":null}] Use 24h time like 09:00-17:00. Days off must be null not the word null. Include every person."},
      ]}],
    }),
  });
  if (!res.ok) {
    var err = await res.json().catch(function(){ return {}; });
    throw new Error((err.error && err.error.message) || ("API error " + res.status));
  }
  var data = await res.json();
  var text = data.content ? data.content.map(function(b){ return b.text || ""; }).join("") : "";
  // Strip markdown fences and whitespace
  text = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  // Extract just the JSON array if there's surrounding text
  var match = text.match(/\[[\s\S]*\]/);
  if (match) text = match[0];
  // Fix common AI JSON mistakes: single quotes, trailing commas
  text = text.replace(/'/g, '"');
  text = text.replace(/,(\s*[}\]])/g, "$1");
  return JSON.parse(text);
}

function UploadScreen({ team, setTeam, selectedWeek, setSelectedWeek, saveWeekSchedules }) {
  const [draft,     setDraft]     = useState({});
  const [saved,     setSaved]     = useState(false);
  const [openId,    setOpenId]    = useState(null);
  const [apiKey,    setApiKey]    = useState(function(){ return localStorage.getItem("ss_api_key") || ""; });
  const [showKey,   setShowKey]   = useState(false);
  const [scanning,  setScanning]  = useState(false);
  const [scanError, setScanError] = useState(null);
  const [scanDone,  setScanDone]  = useState(false);
  const [scanRows,  setScanRows]  = useState([]);
  // rowOverrides: { [i]: { name, matchId } }  matchId = team member id, "new", or "skip"
  const [overrides, setOverrides] = useState({});
  // newMember forms: { [i]: { role } }
  const [newForms,  setNewForms]  = useState({});

  useEffect(function(){
    if (team && team.length > 0) {
      var draftReady = {};
      team.forEach(function(m){ draftReady[m.id] = Object.assign({Mon:null,Tue:null,Wed:null,Thu:null,Fri:null,Sat:null,Sun:null}, m.schedule || {}); });
      setDraft(draftReady);
    }
  }, [team.length]);

  function saveKey(val) { setApiKey(val); localStorage.setItem("ss_api_key", val); }

  function handleFile(e) {
    var file = e.target.files[0];
    if (!file) { setScanError("No file selected."); return; }
    if (!apiKey.trim()) { setScanError("Enter your Anthropic API key first."); return; }
    setScanError(null); setScanning(true); setScanDone(false); setScanRows([]); setOverrides({}); setNewForms({});
    var reader = new FileReader();
    reader.onerror = function(){ setScanError("Could not read file."); setScanning(false); };
    reader.onload = function() {
      var b64 = reader.result.split(",")[1];
      if (!b64) { setScanError("Could not encode image."); setScanning(false); return; }
      parseImage(b64, file.type, apiKey.trim())
        .then(function(rows){
          if (!rows || !rows.length) { setScanError("No schedule data found in image."); return; }
          // Build initial overrides based on auto-match
          var initOverrides = {};
          rows.forEach(function(row, i){
            var match = team.find(function(m){ return m.name.toLowerCase().includes(row.name.split(" ")[0].toLowerCase()); });
            initOverrides[i] = { name: row.name, matchId: match ? String(match.id) : "skip" };
          });
          setScanRows(rows);
          setOverrides(initOverrides);
          // Update draft from auto-matched rows
          setDraft(function(prev){
            var next = Object.assign({}, prev);
            rows.forEach(function(row, i){
              var match = team.find(function(m){ return m.name.toLowerCase().includes(row.name.split(" ")[0].toLowerCase()); });
              if (match) next[match.id] = {Mon:row.Mon,Tue:row.Tue,Wed:row.Wed,Thu:row.Thu,Fri:row.Fri,Sat:row.Sat,Sun:row.Sun};
            });
            return next;
          });
          setScanDone(true); setSaved(false);
        })
        .catch(function(err){ setScanError("Error: " + (err.message || "Could not read schedule.")); })
        .finally(function(){ setScanning(false); });
    };
    reader.readAsDataURL(file);
  }

  function setOverride(i, field, val) {
    setOverrides(function(prev){
      var next = Object.assign({}, prev);
      next[i] = Object.assign({}, next[i], {});
      next[i][field] = val;
      return next;
    });
  }

  function setNewForm(i, field, val) {
    setNewForms(function(prev){
      var next = Object.assign({}, prev);
      next[i] = Object.assign({}, next[i] || {role:"SALES_ADVISOR"}, {});
      next[i][field] = val;
      return next;
    });
  }

  function setShift(memberId, day, val) {
    setDraft(function(prev){
      var next = Object.assign({}, prev);
      next[memberId] = Object.assign({}, next[memberId]);
      next[memberId][day] = val;
      return next;
    });
    setSaved(false);
  }

  function clearShift(memberId, day) { setShift(memberId, day, null); }

  function saveAll() {
    var updatedTeam = team.map(function(m){ return Object.assign({}, m); });
    var nextId = team.length > 0 ? Math.max.apply(null, team.map(function(m){ return m.id; })) + 1 : 1;
    var weekScheduleMap = {};  // memberId -> schedule for this week

    // Apply scan row assignments
    scanRows.forEach(function(row, i){
      var ov = overrides[i] || {};
      if (!ov.matchId || ov.matchId === "skip") return;
      var rowSched = {Mon:row.Mon,Tue:row.Tue,Wed:row.Wed,Thu:row.Thu,Fri:row.Fri,Sat:row.Sat,Sun:row.Sun};
      if (ov.matchId === "new") {
        var form = newForms[i] || {};
        var name = ov.name || row.name;
        var initials = name.split(" ").map(function(w){ return w[0]; }).join("").toUpperCase().slice(0,2);
        var newId = nextId++;
        updatedTeam.push({id:newId, name:name, role:form.role||"SALES_ADVISOR", avatar:initials, isCurrentUser:false, schedule:rowSched});
        weekScheduleMap[newId] = rowSched;
      } else {
        var memberId = Number(ov.matchId);
        weekScheduleMap[memberId] = rowSched;
      }
    });

    // Apply manual draft edits
    Object.keys(draft).forEach(function(mid){
      if (!weekScheduleMap[mid]) weekScheduleMap[mid] = draft[mid];
    });

    // Save team structure (new members etc)
    setTeam(updatedTeam);
    // Save week schedules separately
    if (Object.keys(weekScheduleMap).length > 0) {
      saveWeekSchedules(selectedWeek, weekScheduleMap);
    }
    setSaved(true);
  }

  var selStyle = {border:"1.5px solid "+P.cream,borderRadius:7,padding:"5px 8px",fontSize:11,background:"#fafafa",color:P.ink,outline:"none",fontFamily:"sans-serif"};

  return (
    <div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:20}}>
      <div>
        <div style={{fontWeight:900,fontSize:21,color:P.ink}}>Edit Schedule</div>
        <div style={{fontSize:13,color:P.softInk,marginTop:3}}>Scan a photo or edit shifts manually below.</div>
      </div>

function ShiftSwapApp() {
  const [team,           setTeamState]      = useState([]);
  const [requests,       setReqState]       = useState([]);
  const [schedules,      setSchedulesState] = useState({});   // { weekKey: { memberId: schedule } }
  const [availableWeeks, setAvailableWeeks] = useState([]);
  const [selectedWeek,   setSelectedWeek]   = useState(function(){ return getMondayKey(); });
  const [trueUserId,     setTrueUserId]     = useState(function(){
    var stored = localStorage.getItem("ss_current_user_id");
    return stored ? Number(stored) : 8;
  });
  const [currentUserId,  setCurrentUserId]  = useState(function(){
    var stored = localStorage.getItem("ss_current_user_id");
    return stored ? Number(stored) : 8;
  });
  const [previewMode,    setPreviewMode]    = useState(false);
  const [tab, setTab] = useState(function(){
    var hash = window.location.hash.replace("#","");
    var valid = ["home","find","sched","upload","team"];
    return valid.indexOf(hash) !== -1 ? hash : "home";
  });
  const [loading, setLoading] = useState(true);

  function handleTabChange(key) { setTab(key); window.location.hash = key; }

  // ── Firebase listeners ──────────────────────────────────────────────────────
  useEffect(function(){
    var settled = false;
    function done() { if (!settled) { settled = true; setLoading(false); } }
    var timeout = setTimeout(done, 8000);

    function normalizeTeam(val) {
      return Object.values(val).sort(function(a,b){ return Number(a.id)-Number(b.id); }).map(function(m){
        return Object.assign({}, m, {schedule: Object.assign({}, BLANK_SCHED, m.schedule || {})});
      });
    }

    db.ref("team").once("value", function(snap){
      if (!snap.val()) {
        var obj = {};
        INIT_TEAM.forEach(function(m){ obj[m.id] = m; });
        db.ref("team").set(obj, function(){
          db.ref("team").on("value", function(s){ if(s.val()) setTeamState(normalizeTeam(s.val())); done(); });
        });
      } else {
        db.ref("team").on("value", function(s){ if(s.val()) setTeamState(normalizeTeam(s.val())); done(); });
      }
    }, function(err){ console.error("team err:", err); done(); });

    db.ref("requests").once("value", function(snap){
      if (!snap.val()) {
        var obj = {};
        INIT_REQUESTS.forEach(function(r){ obj[r.id] = r; });
        db.ref("requests").set(obj, function(){
          db.ref("requests").on("value", function(s){ if(s.val()) setReqState(Object.values(s.val()).sort(function(a,b){return Number(b.id)-Number(a.id);})); });
        });
      } else {
        db.ref("requests").on("value", function(s){ if(s.val()) setReqState(Object.values(s.val()).sort(function(a,b){return Number(b.id)-Number(a.id);})); });
      }
    }, function(err){ console.error("requests err:", err); });

    // Schedules node
    db.ref("schedules").on("value", function(snap){
      var val = snap.val() || {};
      setSchedulesState(val);
      var weeks = Object.keys(val).sort();
      if (weeks.length > 0) {
        setAvailableWeeks(weeks);
        // Ensure current week is in the list
        var thisWeek = getMondayKey();
        if (weeks.indexOf(thisWeek) === -1) {
          setAvailableWeeks(function(prev){
            var merged = prev.concat([thisWeek]).sort();
            return merged.filter(function(v,i,a){ return a.indexOf(v)===i; });
          });
        }
      } else {
        setAvailableWeeks([getMondayKey()]);
      }
    });

    return function(){
      clearTimeout(timeout);
      db.ref("team").off();
      db.ref("requests").off();
      db.ref("schedules").off();
    };
  }, []);

  // ── Compute active team with selected week's schedules applied ─────────────
  var activeTeam = team.map(function(m){
    var weekSched = schedules[selectedWeek] && schedules[selectedWeek][m.id];
    var sched = weekSched ? Object.assign({}, BLANK_SCHED, weekSched) : Object.assign({}, BLANK_SCHED, m.schedule || {});
    return Object.assign({}, m, {schedule: sched});
  });

  // ── Firebase write helpers ──────────────────────────────────────────────────
  function setTeam(updatedTeam) {
    var obj = {};
    updatedTeam.forEach(function(m){ obj[m.id] = m; });
    db.ref("team").set(obj);
  }

  function saveWeekSchedules(weekKey, scheduleMap) {
    // scheduleMap: { memberId: { Mon, Tue, ... } }
    // Firebase drops nulls so we convert null to false for storage, back on read
    var clean = {};
    Object.keys(scheduleMap).forEach(function(mid){
      var s = scheduleMap[mid];
      clean[mid] = {};
      DAYS.forEach(function(d){ clean[mid][d] = s[d] || null; });
    });
    db.ref("schedules/" + weekKey).update(clean);
    // Update available weeks
    setAvailableWeeks(function(prev){
      var merged = prev.concat([weekKey]).sort();
      return merged.filter(function(v,i,a){ return a.indexOf(v)===i; });
    });
  }

  function handleRespond(action, reqId, payload) {
    var ref = db.ref("requests/" + reqId);
    ref.once("value", function(snap){
      var req = snap.val();
      if (!req) return;
      if (action === "offer" || action === "cover") {
        var offers = req.offers ? (Array.isArray(req.offers) ? req.offers : Object.values(req.offers)) : [];
        offers = offers.concat([payload]);
        ref.update({offers: offers});
      } else if (action === "accept") {
        ref.update({status: "accepted"});
      }
    });
  }

  function handleCreate(info) {
    var newId = Date.now();
    db.ref("requests/" + newId).set({id:newId, requesterId:info.requesterId || currentUser.id, type:info.type, day:info.day, requesterShift:info.requesterShift, note:info.note, offers:[], status:null});
    handleTabChange("home");
  }

  function setAsMe(id) {
    localStorage.setItem("ss_current_user_id", String(id));
    setTrueUserId(id);
    setCurrentUserId(id);
    setPreviewMode(false);
  }

  function startPreview(id) {
    setCurrentUserId(id);
    setPreviewMode(true);
  }

  function exitPreview() {
    setCurrentUserId(trueUserId);
    setPreviewMode(false);
  }

  // ── Loading / guard ─────────────────────────────────────────────────────────
  if (loading) {
    return (
      <div style={{height:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:P.cream,flexDirection:"column",gap:16}}>
        <div style={{fontSize:36}}>🔄</div>
        <div style={{fontWeight:800,fontSize:15,color:P.ink}}>Loading ShiftSwap...</div>
        <div style={{fontSize:12,color:P.softInk}}>Connecting to database</div>
      </div>
    );
  }

  var currentUser = activeTeam.find(function(m){ return m.id === currentUserId; }) || activeTeam[0];
  if (!currentUser) {
    return (
      <div style={{height:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:P.cream,flexDirection:"column",gap:16}}>
        <div style={{fontSize:36}}>⚠️</div>
        <div style={{fontWeight:800,fontSize:15,color:P.ink}}>No user found</div>
      </div>
    );
  }

  var pendingCount = requests.filter(function(r){ return r.requesterId !== currentUser.id && !r.status; }).length;
  var isAdmin = currentUser.id === trueUserId && !previewMode;

  var tabs = [
    {key:"home",   icon:"🏠", label:"Requests"},
    {key:"find",   icon:"🔍", label:"Find"},
    {key:"sched",  icon:"📅", label:"Schedule"},
    {key:"team",   icon:"👥", label:"Users"},
  ];
  if (isAdmin) tabs.splice(3, 0, {key:"upload", icon:"📷", label:"Upload"});

  return (
    <div style={{maxWidth:480,margin:"0 auto",height:"100dvh",display:"flex",flexDirection:"column",background:P.cream,fontFamily:"sans-serif",position:"relative",overflow:"hidden"}}>
      <div style={{background:P.cream,padding:"14px 18px 10px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <div style={{width:36,height:36,borderRadius:10,background:P.tropicalRain,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🔄</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:16,color:P.ink}}>ShiftSwap</div>
          <div style={{fontSize:10,color:P.softInk,fontFamily:"monospace"}}>Washington Square · WP</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {pendingCount > 0 && (
            <div style={{background:P.tomatoJam,color:"#fff",borderRadius:"50%",width:20,height:20,fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{pendingCount}</div>
          )}
          <Avatar initials={currentUser.avatar} roleKey={currentUser.role} size={34} />
        </div>
      </div>

      {previewMode && <PreviewBanner previewUser={currentUser} onExit={exitPreview} />}

      <WeekPicker weeks={availableWeeks} selectedWeek={selectedWeek} onChange={setSelectedWeek} />

      <div style={{flex:1,overflowY:"auto",paddingBottom:72}}>
        {tab === "home"   && <HomeScreen     team={activeTeam} requests={requests} currentUser={currentUser} onRespond={handleRespond} />}
        {tab === "find"   && <FindScreen     team={activeTeam} currentUser={currentUser} onCreateRequest={handleCreate} />}
        {tab === "sched"  && <ScheduleScreen team={activeTeam} currentUser={currentUser} onCreateRequest={handleCreate} />}
        {tab === "upload" && isAdmin && <UploadScreen team={activeTeam} setTeam={setTeam} selectedWeek={selectedWeek} setSelectedWeek={setSelectedWeek} saveWeekSchedules={saveWeekSchedules} />}
        {tab === "team"   && <TeamScreen team={activeTeam} currentUser={currentUser} trueUserId={trueUserId} setTeam={setTeam} setCurrentUserId={setAsMe} onPreview={startPreview} previewMode={previewMode} />}
      </div>

      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"#fff",borderTop:"1.5px solid "+P.cream,display:"grid",gridTemplateColumns:"repeat("+tabs.length+",1fr)"}}>
        {tabs.map(function(t){
          return (
            <button key={t.key} onClick={function(){ handleTabChange(t.key); }} style={{background:"none",border:"none",padding:"9px 2px 11px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative",color:tab===t.key?P.tropicalRain:P.softInk}}>
              {t.key==="home" && pendingCount>0 && <div style={{position:"absolute",top:6,right:"calc(50% - 14px)",background:P.tomatoJam,borderRadius:"50%",width:8,height:8}} />}
              <span style={{fontSize:18}}>{t.icon}</span>
              <span style={{fontSize:9,fontWeight:tab===t.key?900:600,fontFamily:"monospace"}}>{t.label}</span>
              {tab===t.key && <div style={{position:"absolute",bottom:0,left:"20%",right:"20%",height:2.5,background:P.tropicalRain,borderRadius:2}} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ShiftSwapApp));

  </script>
</body>
</html>
