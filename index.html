<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;


const P = {
  airplaneView:   "#80B0E8",
  peonyBundle:    "#FFC0C0",
  tropicalRain:   "#008471",
  autumnLavender: "#D1CAEA",
  limeade:        "#D6D35F",
  tomatoJam:      "#C45F3F",
  pureSun:        "#F5C518",
  monetPonds:     "#6B7A3A",
  cream:          "#F5F0E8",
  ink:            "#2B2118",
  softInk:        "#5A4E44",
};

const ROLES = {
  STORE_LEAD:     { label:"Store Lead",         short:"SL",  bg:P.tropicalRain,   text:"#fff",       secondary:"Optician" },
  ASST_LEAD:      { label:"Asst. Store Lead",   short:"AL",  bg:P.airplaneView,   text:P.ink,        secondary:"Optician" },
  SUPERVISOR:     { label:"Supervisor",          short:"SUP", bg:P.autumnLavender, text:P.tomatoJam,  secondary:null },
  OPT_SUPERVISOR: { label:"Optical Supervisor", short:"OS",  bg:P.limeade,        text:P.monetPonds, secondary:"Optician" },
  OPTICIAN:       { label:"Optician",            short:"OPT", bg:P.tomatoJam,      text:"#fff",       secondary:null },
  SALES_ADVISOR:  { label:"Sales Advisor",       short:"SA",  bg:P.peonyBundle,    text:P.tomatoJam,  secondary:null },
};

const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

const INIT_TEAM = [
  { id:1, name:"Jordan M.",   role:"STORE_LEAD",     avatar:"JM", isCurrentUser:false, schedule:{Mon:"9:00-17:00",  Tue:"9:00-17:00",  Wed:null,          Thu:"9:00-17:00",  Fri:"9:00-17:00",  Sat:null,          Sun:"10:00-18:00" }},
  { id:2, name:"Alex R.",     role:"ASST_LEAD",      avatar:"AR", isCurrentUser:false, schedule:{Mon:"10:00-18:00", Tue:null,          Wed:"10:00-18:00", Thu:"10:00-18:00", Fri:"10:00-18:00", Sat:"9:00-17:00",  Sun:null          }},
  { id:3, name:"Sam T.",      role:"OPT_SUPERVISOR", avatar:"ST", isCurrentUser:false, schedule:{Mon:"11:00-19:00", Tue:"11:00-19:00", Wed:"11:00-19:00", Thu:null,          Fri:"11:00-19:00", Sat:"10:00-18:00", Sun:null          }},
  { id:4, name:"Riley K.",    role:"OPTICIAN",       avatar:"RK", isCurrentUser:false, schedule:{Mon:null,          Tue:"9:00-17:00",  Wed:"9:00-17:00",  Thu:"9:00-17:00",  Fri:null,          Sat:"10:00-18:00", Sun:"10:00-18:00" }},
  { id:5, name:"Casey B.",    role:"SALES_ADVISOR",  avatar:"CB", isCurrentUser:false, schedule:{Mon:"12:00-20:00", Tue:"12:00-20:00", Wed:null,          Thu:"12:00-20:00", Fri:"12:00-20:00", Sat:"11:00-19:00", Sun:null          }},
  { id:6, name:"Morgan L.",   role:"SALES_ADVISOR",  avatar:"ML", isCurrentUser:false, schedule:{Mon:"9:00-17:00",  Tue:null,          Wed:"9:00-17:00",  Thu:null,          Fri:"9:00-17:00",  Sat:"10:00-18:00", Sun:"12:00-20:00" }},
  { id:7, name:"Drew P.",     role:"SUPERVISOR",     avatar:"DP", isCurrentUser:false, schedule:{Mon:null,          Tue:"10:00-18:00", Wed:"10:00-18:00", Thu:"10:00-18:00", Fri:null,          Sat:"9:00-17:00",  Sun:"9:00-17:00"  }},
  { id:8, name:"Priya (You)", role:"OPTICIAN",       avatar:"PY", isCurrentUser:true,  schedule:{Mon:"9:00-17:00",  Tue:"9:00-17:00",  Wed:null,          Thu:null,          Fri:"11:00-19:00", Sat:"10:00-18:00", Sun:null          }},
];

const INIT_REQUESTS = [
  { id:1, requesterId:5, type:"COVER", day:"Fri", requesterShift:"12:00-20:00", note:"Doctor appointment", offers:[], status:null },
  { id:2, requesterId:4, type:"SWAP",  day:"Sat", requesterShift:"10:00-18:00", note:"Family event",       offers:[{offererId:6, offeredShift:"10:00-18:00"}], status:null },
];

function parseTime(t) { const [h,m] = t.split(":").map(Number); return h + m/60; }
function shiftHours(s) { if (!s) return 0; const [a,b] = s.split("-"); return parseTime(b) - parseTime(a); }

function fmt12(t) {
  if (!t) return "";
  const [h,m] = t.split(":").map(Number);
  const ampm = h >= 12 ? "pm" : "am";
  const hr = h % 12 || 12;
  return m === 0 ? `${hr}${ampm}` : `${hr}:${String(m).padStart(2,"0")}${ampm}`;
}

function fmtShift(s) {
  if (!s) return "OFF";
  const [a,b] = s.split("-");
  return fmt12(a) + "-" + fmt12(b);
}

function diffInfo(a, b) {
  const d = shiftHours(b) - shiftHours(a);
  if (d === 0) return { label:"Equal swap",    color:P.monetPonds, bg:P.limeade + "55"    };
  if (d  > 0)  return { label:"+" + d + "h for you", color:"#8B6914", bg:P.pureSun + "55" };
  return             { label:d + "h for you",  color:P.tomatoJam, bg:P.peonyBundle + "88" };
}

function isOpt(rk) { return rk === "OPTICIAN" || ROLES[rk]?.secondary === "Optician"; }

function Avatar({ initials, roleKey, size }) {
  const sz = size || 36;
  const r = ROLES[roleKey] || ROLES.SALES_ADVISOR;
  return (
    <div style={{width:sz,height:sz,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*0.3,fontWeight:900,background:r.bg,color:r.text,fontFamily:"monospace"}}>
      {initials}
    </div>
  );
}

function Pill({ roleKey, mini }) {
  const r = ROLES[roleKey] || ROLES.SALES_ADVISOR;
  return (
    <span style={{background:r.bg,color:r.text,fontSize:mini?8:10,fontWeight:800,padding:mini?"1px 5px":"2px 8px",borderRadius:5,fontFamily:"monospace",display:"inline-flex",alignItems:"center",gap:3,flexShrink:0}}>
      {r.short}
      {r.secondary && !mini && <span style={{opacity:.55,fontWeight:500}}>+opt</span>}
    </span>
  );
}

function DiffBadge({ shiftA, shiftB }) {
  const d = diffInfo(shiftA, shiftB);
  return (
    <span style={{background:d.bg,color:d.color,fontSize:10,fontWeight:800,padding:"3px 8px",borderRadius:6,fontFamily:"monospace",flexShrink:0}}>
      {d.label}
    </span>
  );
}

function SLabel({ children, small }) {
  return (
    <div style={{fontSize:small?9:11,fontWeight:800,color:P.softInk,letterSpacing:".1em",fontFamily:"monospace",marginBottom:small?6:10,textTransform:"uppercase"}}>
      {children}
    </div>
  );
}

function Empty({ icon, text }) {
  return (
    <div style={{background:P.cream,border:"2px dashed " + P.autumnLavender,borderRadius:14,padding:"28px 20px",textAlign:"center"}}>
      <div style={{fontSize:28,marginBottom:8}}>{icon}</div>
      <div style={{fontSize:13,color:P.softInk,lineHeight:1.5}}>{text}</div>
    </div>
  );
}

function Sheet({ children, onClose }) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(43,33,24,.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={function(e){e.stopPropagation();}} style={{background:"#fff",borderRadius:"22px 22px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:480,maxHeight:"92dvh",overflowY:"auto"}}>
        <div style={{width:40,height:4,background:P.cream,borderRadius:2,margin:"0 auto 20px"}} />
        {children}
      </div>
    </div>
  );
}

function ReqCard({ req, team, currentUser, onRespond, isOwn }) {
  const [open, setOpen] = useState(false);
  const requester = team.find(function(m){ return m.id === req.requesterId; });
  const myShift = currentUser.schedule[req.day];
  const alreadyOffered = req.offers && req.offers.find(function(o){ return o.offererId === currentUser.id; });
  const hrs = shiftHours(req.requesterShift);

  return (
    <div style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 12px rgba(43,33,24,.08)",border:"1.5px solid " + P.cream}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",cursor:"pointer"}} onClick={function(){ setOpen(!open); }}>
        <Avatar initials={requester.avatar} roleKey={requester.role} />
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontWeight:900,fontSize:14,color:P.ink}}>{requester.name}</span>
            <Pill roleKey={requester.role} />
          </div>
          <div style={{fontSize:11,color:P.softInk,marginTop:2}}>
            {req.type === "COVER" ? "Full cover" : "Swap"} {req.day} {fmtShift(req.requesterShift)} ({hrs}h)
          </div>
        </div>
        <div style={{background:req.type === "COVER" ? P.pureSun + "44" : P.airplaneView + "44",color:req.type === "COVER" ? "#8B6914" : P.tropicalRain,fontSize:9,fontWeight:800,padding:"4px 9px",borderRadius:6,fontFamily:"monospace",flexShrink:0}}>
          {req.type}
        </div>
        <span style={{color:"#ccc",fontSize:12,marginLeft:2}}>{open ? "▲" : "▼"}</span>
      </div>

      {open && (
        <div style={{borderTop:"1.5px solid " + P.cream,padding:"14px 16px",background:P.cream + "88",display:"flex",flexDirection:"column",gap:12}}>
          {req.note && (
            <div style={{fontSize:12,color:P.softInk,fontStyle:"italic"}}>"{req.note}"</div>
          )}
          {req.offers && req.offers.length > 0 && (
            <div>
              <SLabel small>Offers</SLabel>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {req.offers.map(function(offer, i){
                  const offerer = team.find(function(m){ return m.id === offer.offererId; });
                  return (
                    <div key={i} style={{background:"#fff",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,border:"1.5px solid " + P.cream}}>
                      <Avatar initials={offerer && offerer.avatar} roleKey={offerer && offerer.role} size={28} />
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:800,fontSize:13,color:P.ink}}>{offerer && offerer.name}</div>
                        <div style={{fontSize:11,color:P.softInk,fontFamily:"monospace"}}>{fmtShift(offer.offeredShift)}</div>
                      </div>
                      <DiffBadge shiftA={req.requesterShift} shiftB={offer.offeredShift} />
                      {isOwn && (
                        <button onClick={function(){ onRespond("accept", req.id, offer); }} style={{background:P.tropicalRain,color:"#fff",border:"none",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:800,cursor:"pointer",flexShrink:0}}>
                          Accept
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {!isOwn && !alreadyOffered && req.type === "SWAP" && myShift && (
            <div style={{background:"#fff",borderRadius:10,padding:"12px 14px",border:"2px solid " + P.airplaneView,display:"flex",alignItems:"center",gap:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:P.softInk,marginBottom:2}}>Your {req.day} shift</div>
                <div style={{fontWeight:900,fontSize:14,fontFamily:"monospace",color:P.ink}}>{fmtShift(myShift)}</div>
                <div style={{marginTop:4}}><DiffBadge shiftA={req.requesterShift} shiftB={myShift} /></div>
              </div>
              <button onClick={function(){ onRespond("offer", req.id, {offererId:currentUser.id, offeredShift:myShift}); }} style={{background:P.tropicalRain,color:"#fff",border:"none",borderRadius:10,padding:"10px 14px",fontSize:12,fontWeight:800,cursor:"pointer",flexShrink:0}}>
                Offer Swap
              </button>
            </div>
          )}
          {!isOwn && !alreadyOffered && req.type === "COVER" && myShift && (
            <button onClick={function(){ onRespond("cover", req.id, {offererId:currentUser.id, offeredShift:req.requesterShift}); }} style={{background:P.tomatoJam,color:"#fff",border:"none",borderRadius:10,padding:"12px",fontSize:13,fontWeight:800,cursor:"pointer",width:"100%"}}>
              Take This Shift — {fmtShift(req.requesterShift)}
            </button>
          )}
          {alreadyOffered && (
            <div style={{background:P.limeade + "44",borderRadius:9,padding:"10px 14px",color:P.monetPonds,fontSize:13,fontWeight:800,textAlign:"center"}}>
              You responded
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function HomeScreen({ team, requests, currentUser, onRespond }) {
  const mine  = requests.filter(function(r){ return r.requesterId === currentUser.id; });
  const theirs = requests.filter(function(r){ return r.requesterId !== currentUser.id; });

  return (
    <div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:24}}>
      <div style={{background:P.tropicalRain,borderRadius:20,padding:"18px 20px",color:"#fff"}}>
        <div style={{fontSize:9,opacity:.7,letterSpacing:".1em",fontFamily:"monospace",marginBottom:10}}>OPTICIAN COVERAGE — THIS WEEK</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {DAYS.map(function(day){
            const ok = team.some(function(m){ return isOpt(m.role) && m.schedule[day]; });
            return (
              <div key={day} style={{background:ok ? "rgba(255,255,255,.18)" : P.tomatoJam + "BB",borderRadius:8,padding:"6px 10px",textAlign:"center",minWidth:36}}>
                <div style={{fontSize:9,opacity:.8,fontFamily:"monospace"}}>{day}</div>
                <div style={{fontSize:16,marginTop:2}}>{ok ? "✓" : "⚠"}</div>
              </div>
            );
          })}
        </div>
      </div>

      {mine.length > 0 && (
        <div>
          <SLabel>My Requests</SLabel>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {mine.map(function(r){ return <ReqCard key={r.id} req={r} team={team} currentUser={currentUser} onRespond={onRespond} isOwn={true} />; })}
          </div>
        </div>
      )}

      <div>
        <SLabel>Open Requests</SLabel>
        {theirs.length === 0
          ? <Empty icon="🌿" text="No open requests right now" />
          : (
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {theirs.map(function(r){ return <ReqCard key={r.id} req={r} team={team} currentUser={currentUser} onRespond={onRespond} />; })}
            </div>
          )
        }
      </div>
    </div>
  );
}

function FindScreen({ team, currentUser, onCreateRequest }) {
  const [selDay,  setSelDay]  = useState(null);
  const [selType, setSelType] = useState(null);
  const [note,    setNote]    = useState("");
  const [posted,  setPosted]  = useState(false);

  const myShift = selDay ? currentUser.schedule[selDay] : null;

  const suggestions = (selDay && selType)
    ? team
        .filter(function(m){
          if (m.id === currentUser.id) return false;
          const s = m.schedule[selDay];
          return selType === "COVER" ? !s : !!s;
        })
        .map(function(m){
          const roleMatch = m.role === currentUser.role;
          const optMatch  = isOpt(currentUser.role) ? isOpt(m.role) : true;
          return Object.assign({}, m, { theirShift:m.schedule[selDay], score:(roleMatch?2:0)+(optMatch?1:0), roleMatch:roleMatch });
        })
        .sort(function(a,b){ return b.score - a.score; })
    : [];

  if (posted) {
    return (
      <div style={{padding:"48px 24px",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
        <div style={{fontSize:52}}>🎉</div>
        <div style={{fontWeight:900,fontSize:22,color:P.ink}}>Request Posted!</div>
        <div style={{fontSize:13,color:P.softInk,lineHeight:1.6}}>Your team will see it in Requests.</div>
        <button onClick={function(){ setPosted(false); setSelDay(null); setSelType(null); setNote(""); }} style={{marginTop:8,background:P.tropicalRain,color:"#fff",border:"none",borderRadius:12,padding:"12px 28px",fontSize:14,fontWeight:800,cursor:"pointer"}}>
          Find Another
        </button>
      </div>
    );
  }

  return (
    <div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:22}}>
      <div>
        <div style={{fontWeight:900,fontSize:21,color:P.ink}}>Find Coverage</div>
        <div style={{fontSize:13,color:P.softInk,marginTop:3}}>Pick a shift and see who can help.</div>
      </div>

      <div>
        <SLabel>1 — Pick a Day</SLabel>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
          {DAYS.map(function(day){
            const shift = currentUser.schedule[day];
            const active = selDay === day;
            return (
              <div key={day} onClick={function(){ if (!shift) return; setSelDay(day); setSelType(null); }} style={{borderRadius:12,overflow:"hidden",cursor:shift?"pointer":"default",opacity:shift?1:.38,border:"2.5px solid " + (active ? P.tomatoJam : P.cream),boxShadow:active?"0 0 0 3px " + P.tomatoJam + "30":"none",transition:"all .15s"}}>
                <div style={{background:active?P.tomatoJam:shift?P.ink:P.autumnLavender,color:"#fff",padding:"5px 2px",textAlign:"center",fontSize:9,fontWeight:800,fontFamily:"monospace"}}>
                  {day}
                </div>
                <div style={{background:"#fff",padding:"7px 2px",textAlign:"center"}}>
                  {shift ? (
                    <div>
                      <div style={{fontSize:14,fontWeight:900,color:active?P.tomatoJam:P.ink}}>{shiftHours(shift)}h</div>
                      <div style={{fontSize:7,color:P.softInk,fontFamily:"monospace",lineHeight:1.3,marginTop:2}}>{fmt12(shift.split("-")[0])}<br />{fmt12(shift.split("-")[1])}</div>
                    </div>
                  ) : (
                    <div style={{fontSize:9,color:"#ccc",padding:"5px 0"}}>OFF</div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {selDay && myShift && (
        <div>
          <SLabel>2 — What Do You Need?</SLabel>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:8}}>
            {[
              {key:"SWAP",  icon:"🔄", label:"Shift Swap",  desc:"Trade shifts same day"},
              {key:"COVER", icon:"🙋", label:"Full Cover",  desc:"Need the whole day off"},
            ].map(function(opt){
              return (
                <div key={opt.key} onClick={function(){ setSelType(opt.key); }} style={{border:"2.5px solid " + (selType === opt.key ? P.tomatoJam : P.cream),borderRadius:14,padding:"16px 14px",cursor:"pointer",background:selType === opt.key ? P.tomatoJam + "15" : "#fff",transition:"all .15s"}}>
                  <div style={{fontSize:24,marginBottom:8}}>{opt.icon}</div>
                  <div style={{fontWeight:900,fontSize:13,color:P.ink}}>{opt.label}</div>
                  <div style={{fontSize:11,color:P.softInk,marginTop:3}}>{opt.desc}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {selDay && myShift && selType && (
        <div>
          <SLabel>3 — Who Could Help?</SLabel>
          {suggestions.length === 0 ? (
            <Empty icon="🌾" text={selType === "COVER" ? "No teammates are off that day." : "No teammates working that day to swap with."} />
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {suggestions.map(function(m){
                return (
                  <div key={m.id} style={{background:"#fff",borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 12px rgba(43,33,24,.08)",border:"2px solid " + (m.score >= 3 ? P.limeade : m.score >= 2 ? P.airplaneView : P.cream)}}>
                    <Avatar initials={m.avatar} roleKey={m.role} />
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:3}}>
                        <span style={{fontWeight:900,fontSize:14,color:P.ink}}>{m.name}</span>
                        <Pill roleKey={m.role} />
                        {m.roleMatch && <span style={{fontSize:8,background:P.limeade + "55",color:P.monetPonds,padding:"2px 6px",borderRadius:5,fontWeight:800,fontFamily:"monospace"}}>SAME ROLE</span>}
                      </div>

var HOUR_OPTIONS = [];
for (var _h = 6; _h <= 23; _h++) {
  var _ap = _h >= 12 ? "pm" : "am";
  var _hr = _h % 12 || 12;
  HOUR_OPTIONS.push({ val: _h + ":00", label: _hr + ":00" + _ap });
  HOUR_OPTIONS.push({ val: _h + ":30", label: _hr + ":30" + _ap });
}

function ShiftEditor({ value, onChange, onClear }) {
  var parts = value ? value.split("-") : ["9:00","17:00"];
  var startVal = value ? parts[0] : "";
  var endVal   = value ? parts[1] : "";

  function handleStart(e) {
    var s = e.target.value;
    var end = endVal || "17:00";
    if (parseTime(end) <= parseTime(s)) {
      var idx = HOUR_OPTIONS.findIndex(function(o){ return o.val === s; });
      end = idx < HOUR_OPTIONS.length - 1 ? HOUR_OPTIONS[idx+2].val : end;
    }
    onChange(s + "-" + end);
  }
  function handleEnd(e) {
    var end = e.target.value;
    var start = startVal || "9:00";
    if (parseTime(end) <= parseTime(start)) return;
    onChange(start + "-" + end);
  }

  var selStyle = {border:"1.5px solid " + P.cream, borderRadius:8, padding:"7px 6px", fontSize:12, background:"#fafafa", color:P.ink, outline:"none", flex:1};

  return (
    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6}}>
      <select value={startVal} onChange={handleStart} style={selStyle}>
        <option value="">start</option>
        {HOUR_OPTIONS.slice(0, HOUR_OPTIONS.length-2).map(function(o){
          return <option key={o.val} value={o.val}>{o.label}</option>;
        })}
      </select>
      <span style={{color:P.softInk,fontSize:11,flexShrink:0}}>to</span>
      <select value={endVal} onChange={handleEnd} style={selStyle}>
        <option value="">end</option>
        {HOUR_OPTIONS.slice(2).map(function(o){
          return <option key={o.val} value={o.val}>{o.label}</option>;
        })}
      </select>
      {value && (
        <button onClick={onClear} style={{background:P.peonyBundle+"88",border:"none",borderRadius:7,padding:"7px 9px",fontSize:12,cursor:"pointer",color:P.tomatoJam,fontWeight:800,flexShrink:0}}>
          Off
        </button>
      )}
    </div>
  );
}

async function parseImage(base64, mediaType, apiKey) {
  var res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model:"claude-sonnet-4-5",
      max_tokens:1000,
      messages:[{role:"user",content:[
        {type:"image", source:{type:"base64",media_type:mediaType,data:base64}},
        {type:"text",  text:"Extract the weekly work schedule from this image. Return ONLY a valid JSON array. No explanation, no markdown, no code fences. Use double-quoted keys and string values. Format: [{\"name\":\"Full Name\",\"Mon\":\"09:00-17:00\",\"Tue\":null,\"Wed\":\"09:00-17:00\",\"Thu\":null,\"Fri\":null,\"Sat\":null,\"Sun\":null}] Use 24h time like 09:00-17:00. Days off must be null not the word null. Include every person."},
      ]}],
    }),
  });
  if (!res.ok) {
    var err = await res.json().catch(function(){ return {}; });
    throw new Error((err.error && err.error.message) || ("API error " + res.status));
  }
  var data = await res.json();
  var text = data.content ? data.content.map(function(b){ return b.text || ""; }).join("") : "";
  // Strip markdown fences and whitespace
  text = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  // Extract just the JSON array if there's surrounding text
  var match = text.match(/\[[\s\S]*\]/);
  if (match) text = match[0];
  // Fix common AI JSON mistakes: single quotes, trailing commas
  text = text.replace(/'/g, '"');
  text = text.replace(/,(\s*[}\]])/g, "$1");
  return JSON.parse(text);
}

function UploadScreen({ team, setTeam }) {
  const [draft,     setDraft]     = useState({});
  const [saved,     setSaved]     = useState(false);
  const [openId,    setOpenId]    = useState(null);
  const [apiKey,    setApiKey]    = useState(function(){ return localStorage.getItem("ss_api_key") || ""; });
  const [showKey,   setShowKey]   = useState(false);
  const [scanning,  setScanning]  = useState(false);
  const [scanError, setScanError] = useState(null);
  const [scanDone,  setScanDone]  = useState(false);
  const fileRef = useRef();

  // Keep draft in sync when team loads from Firebase
  useEffect(function(){
    if (team && team.length > 0) {
      var initDraft = {};
      team.forEach(function(m){ initDraft[m.id] = Object.assign({}, m.schedule); });
      setDraft(initDraft);
    }
  }, [team.length]);

  function saveKey(val) { setApiKey(val); localStorage.setItem("ss_api_key", val); }

  function handleFile(e) {
    var file = e.target.files[0];
    if (!file) { setScanError("No file selected."); return; }
    if (!apiKey.trim()) { setScanError("Enter your Anthropic API key first."); return; }
    setScanError(null); setScanning(true); setScanDone(false);
    var reader = new FileReader();
    reader.onerror = function(){ setScanError("Could not read file."); setScanning(false); };
    reader.onload = function() {
      var b64 = reader.result.split(",")[1];
      if (!b64) { setScanError("Could not encode image."); setScanning(false); return; }
      parseImage(b64, file.type, apiKey.trim())
        .then(function(rows){
          if (!rows || !rows.length) { setScanError("No schedule data found in image."); return; }
          setDraft(function(prev){
            var next = Object.assign({}, prev);
            rows.forEach(function(row){
              var match = team.find(function(m){
                return m.name.toLowerCase().includes(row.name.split(" ")[0].toLowerCase());
              });
              if (match) next[match.id] = {Mon:row.Mon,Tue:row.Tue,Wed:row.Wed,Thu:row.Thu,Fri:row.Fri,Sat:row.Sat,Sun:row.Sun};
            });
            return next;
          });
          setScanDone(true); setSaved(false);
        })
        .catch(function(err){ setScanError("Error: " + (err.message || "Could not read schedule.")); })
        .finally(function(){ setScanning(false); });
    };
    reader.readAsDataURL(file);
  }

  function setShift(memberId, day, val) {
    setDraft(function(prev){
      var next = Object.assign({}, prev);
      next[memberId] = Object.assign({}, next[memberId]);
      next[memberId][day] = val;
      return next;
    });
    setSaved(false);
  }

  function clearShift(memberId, day) { setShift(memberId, day, null); }

  function saveAll() {
    var updated = team.map(function(m){
      return Object.assign({}, m, {schedule: draft[m.id] || m.schedule});
    });
    setTeam(updated);
    setSaved(true);
  }

  return (
    <div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:20}}>
      <div>
        <div style={{fontWeight:900,fontSize:21,color:P.ink}}>Edit Schedule</div>
        <div style={{fontSize:13,color:P.softInk,marginTop:3}}>Scan a photo or edit shifts manually below.</div>
      </div>

      <div style={{background:"#fff",borderRadius:14,padding:"16px",border:"1.5px solid "+P.cream,display:"flex",flexDirection:"column",gap:10}}>
        <div style={{fontSize:11,fontWeight:800,color:P.softInk,letterSpacing:".08em",fontFamily:"monospace",textTransform:"uppercase"}}>Scan Schedule Photo (Optional)</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input
            type={showKey ? "text" : "password"}
            value={apiKey}
            onChange={function(e){ saveKey(e.target.value); }}
            placeholder="Anthropic API key — sk-ant-..."
            style={{flex:1,border:"1.5px solid "+P.cream,borderRadius:8,padding:"9px 12px",fontSize:12,outline:"none",background:"#fafafa",minWidth:0}}
          />
          <button onClick={function(){ setShowKey(!showKey); }} style={{background:P.cream,border:"none",borderRadius:8,padding:"9px 10px",fontSize:11,fontWeight:700,cursor:"pointer",color:P.softInk,flexShrink:0}}>
            {showKey ? "Hide" : "Show"}
          </button>
        </div>
        {apiKey && apiKey.startsWith("sk-ant-") && (
          <div style={{fontSize:11,fontWeight:800,color:P.monetPonds}}>Key saved to this device</div>
        )}
        <label
          style={{border:"2px dashed "+P.airplaneView,borderRadius:12,padding:"18px",textAlign:"center",cursor:"pointer",background:P.airplaneView+"12",opacity:apiKey.trim()?1:0.45,display:"block"}}
        >
          <div style={{fontSize:26,marginBottom:6}}>📷</div>
          <div style={{fontWeight:800,fontSize:13,color:P.ink}}>{scanning ? "Reading with AI..." : "Tap to scan schedule photo"}</div>
          <div style={{fontSize:11,color:P.softInk,marginTop:3}}>PNG · JPG · HEIC</div>
          <input type="file" accept="image/*" style={{display:"none"}} onChange={handleFile} />
        </label>
        {scanDone && <div style={{fontSize:12,fontWeight:800,color:P.monetPonds}}>Scan complete — review and tap Save.</div>}
        {scanError && <div style={{fontSize:12,color:P.tomatoJam,background:P.peonyBundle+"55",borderRadius:8,padding:"8px 12px"}}>{scanError}</div>}
        <div style={{fontSize:11,color:P.softInk,lineHeight:1.5}}>Get a key free at <strong>console.anthropic.com</strong>. Under $0.01 per scan. Saved locally only.</div>
      </div>

      {saved && (
        <div style={{background:P.limeade+"44",borderRadius:12,padding:"12px 16px",color:P.monetPonds,fontSize:13,fontWeight:800}}>
          Schedule saved!
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {team.map(function(member){
          var r = ROLES[member.role] || ROLES.SALES_ADVISOR;
          var memberDraft = draft[member.id] || {};

                <Avatar initials={member.avatar} roleKey={member.role} />

                  {DAYS.map(function(day){

                          <div style={{width:36,fontSize:11,fontWeight:800,color:P.softInk,fontFamily:"monospace"}}>{day}</div>
                          {!shift ? (
                            <button onClick={function(){ setShift(member.id, day, "9:00-17:00"); }} style={{background:P.airplaneView+"33",border:"1.5px dashed "+P.airplaneView,borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer",color:P.tropicalRain}}>

  return (
    <div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:22}}>
      <div style={{background:P.tropicalRain,borderRadius:20,padding:"24px 22px",color:"#fff"}}>
        <Avatar initials={me.avatar} roleKey={me.role} size={54} />
        <div style={{marginTop:14,fontWeight:900,fontSize:22}}>{me.name}</div>
        <div style={{fontSize:13,opacity:.8,marginTop:3}}>{ROLES[me.role].label}</div>
        {ROLES[me.role].secondary && (
          <div style={{fontSize:11,opacity:.6,marginTop:2}}>+ {ROLES[me.role].secondary}</div>
        )}
      </div>

      <div>
        <SLabel>Team Members</SLabel>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {team.map(function(member){
            return (
              <div key={member.id} style={{background:"#fff",borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 8px rgba(43,33,24,.06)"}}>
                <Avatar initials={member.avatar} roleKey={member.role} />
                <div style={{flex:1}}>
                  <div style={{fontWeight:900,fontSize:14,color:P.ink}}>{member.name}</div>
                  <div style={{marginTop:3}}><Pill roleKey={member.role} /></div>
                </div>
                <button onClick={function(){ setEditId(member.id); }} style={{background:P.cream,border:"none",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:800,cursor:"pointer",color:P.softInk}}>
                  Edit
                </button>
              </div>
            );
          })}
        </div>
      </div>

      {editMember && (
        <EditRoleSheet member={editMember} onSave={updateRole} onClose={function(){ setEditId(null); }} />
      )}
    </div>
  );
}

function ShiftSwapApp() {
  const [team,     setTeamState] = useState([]);
  const [requests, setReqState]  = useState([]);
  const [tab, setTab] = useState(function(){
    var hash = window.location.hash.replace("#","");
    var valid = ["home","find","sched","upload","team"];
    return valid.indexOf(hash) !== -1 ? hash : "home";
  });

  function handleTabChange(key) {
    handleTabChange(key);
    window.location.hash = key;
  }
  const [loading,  setLoading]   = useState(true);

  // ── Firebase listeners ──────────────────────────────────────────────────────
  useEffect(function(){
    // Team: seed if empty, then listen
    db.ref("team").once("value", function(snap){
      if (!snap.val()) {
        var obj = {};
        INIT_TEAM.forEach(function(m){ obj[m.id] = m; });
        db.ref("team").set(obj, function(){
          // Only start listening AFTER seed is complete
          db.ref("team").on("value", function(snap2){
            var val = snap2.val();
            if (val) {
              var arr = Object.values(val).sort(function(a,b){ return Number(a.id) - Number(b.id); });
              setTeamState(arr);
            }
            setLoading(false);
          });
        });
      } else {
        // Data exists, start listening immediately
        db.ref("team").on("value", function(snap2){
          var val = snap2.val();
          if (val) {
            var arr = Object.values(val).sort(function(a,b){ return Number(a.id) - Number(b.id); });
            setTeamState(arr);
          }
          setLoading(false);
        });
      }
    });

    // Requests: seed if empty, then listen
    db.ref("requests").once("value", function(snap){
      if (!snap.val()) {
        var obj = {};
        INIT_REQUESTS.forEach(function(r){ obj[r.id] = r; });
        db.ref("requests").set(obj, function(){
          db.ref("requests").on("value", function(snap2){
            var val = snap2.val();
            if (val) {
              var arr = Object.values(val).sort(function(a,b){ return Number(b.id) - Number(a.id); });
              setReqState(arr);
            }
          });
        });
      } else {
        db.ref("requests").on("value", function(snap2){
          var val = snap2.val();
          if (val) {
            var arr = Object.values(val).sort(function(a,b){ return Number(b.id) - Number(a.id); });
            setReqState(arr);
          }
        });
      }
    });

    return function(){
      db.ref("team").off();
      db.ref("requests").off();
    };
  }, []);

  // ── Firebase write helpers ──────────────────────────────────────────────────
  function setTeam(updatedTeam) {
    var obj = {};
    updatedTeam.forEach(function(m){ obj[m.id] = m; });
    db.ref("team").set(obj);
  }

  function handleRespond(action, reqId, payload) {
    var ref = db.ref("requests/" + reqId);
    ref.once("value", function(snap){
      var req = snap.val();
      if (!req) return;
      if (action === "offer" || action === "cover") {
        var offers = req.offers ? (Array.isArray(req.offers) ? req.offers : Object.values(req.offers)) : [];
        offers = offers.concat([payload]);
        ref.update({offers: offers});
      } else if (action === "accept") {
        ref.update({status: "accepted"});
      }
    });
  }

  function handleCreate(info) {
    var newId = Date.now();
    db.ref("requests/" + newId).set({
      id: newId,
      requesterId: currentUser.id,
      type: info.type,
      day: info.day,
      requesterShift: info.requesterShift,
      note: info.note,
      offers: [],
      status: null
    });
    handleTabChange("home");
  }

  // ── Loading / guard ─────────────────────────────────────────────────────────
  if (loading) {
    return (
      <div style={{height:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:P.cream,flexDirection:"column",gap:16}}>
        <div style={{fontSize:36}}>🔄</div>
        <div style={{fontWeight:800,fontSize:15,color:P.ink}}>Loading ShiftSwap...</div>
        <div style={{fontSize:12,color:P.softInk}}>Connecting to database</div>
      </div>
    );
  }

  var currentUser = team.find(function(m){ return m.isCurrentUser; });
  if (!currentUser) {
    return (
      <div style={{height:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:P.cream,flexDirection:"column",gap:16}}>
        <div style={{fontSize:36}}>⚠️</div>
        <div style={{fontWeight:800,fontSize:15,color:P.ink}}>No user found</div>
        <div style={{fontSize:12,color:P.softInk}}>Check your database connection</div>
      </div>
    );
  }

  var pendingCount = requests.filter(function(r){ return r.requesterId !== currentUser.id && !r.status; }).length;

  const tabs = [
    {key:"home",   icon:"🏠", label:"Requests"},
    {key:"find",   icon:"🔍", label:"Find"},
    {key:"sched",  icon:"📅", label:"Schedule"},
    {key:"upload", icon:"📷", label:"Upload"},
    {key:"team",   icon:"👥", label:"Users"},
  ];

  return (
    <div style={{maxWidth:480,margin:"0 auto",height:"100dvh",display:"flex",flexDirection:"column",background:P.cream,fontFamily:"sans-serif",position:"relative",overflow:"hidden"}}>
      <div style={{background:P.cream,padding:"14px 18px 12px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <div style={{width:36,height:36,borderRadius:10,background:P.tropicalRain,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🔄</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:16,color:P.ink}}>ShiftSwap</div>
          <div style={{fontSize:10,color:P.softInk,fontFamily:"monospace"}}>Washington Square · WP</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {pendingCount > 0 && (
            <div style={{background:P.tomatoJam,color:"#fff",borderRadius:"50%",width:20,height:20,fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {pendingCount}
            </div>
          )}
          <Avatar initials={currentUser.avatar} roleKey={currentUser.role} size={34} />
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",paddingBottom:72}}>
        {tab === "home"   && <HomeScreen     team={team} requests={requests} currentUser={currentUser} onRespond={handleRespond} />}
        {tab === "find"   && <FindScreen     team={team} currentUser={currentUser} onCreateRequest={handleCreate} />}
        {tab === "sched"  && <ScheduleScreen team={team} currentUser={currentUser} onCreateRequest={handleCreate} />}
        {tab === "upload" && <UploadScreen   team={team} setTeam={setTeam} />}
        {tab === "team"   && <TeamScreen     team={team} currentUser={currentUser} setTeam={setTeam} />}
      </div>

      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"#fff",borderTop:"1.5px solid " + P.cream,display:"grid",gridTemplateColumns:"repeat(5,1fr)"}}>
        {tabs.map(function(t){
          return (
            <button key={t.key} onClick={function(){ handleTabChange(t.key); }} style={{background:"none",border:"none",padding:"9px 2px 11px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative",color:tab === t.key ? P.tropicalRain : P.softInk}}>
              {t.key === "home" && pendingCount > 0 && (
                <div style={{position:"absolute",top:6,right:"calc(50% - 14px)",background:P.tomatoJam,borderRadius:"50%",width:8,height:8}} />
              )}
              <span style={{fontSize:18}}>{t.icon}</span>
              <span style={{fontSize:9,fontWeight:tab === t.key ? 900 : 600,fontFamily:"monospace"}}>{t.label}</span>
              {tab === t.key && (
                <div style={{position:"absolute",bottom:0,left:"20%",right:"20%",height:2.5,background:P.tropicalRain,borderRadius:2}} />
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ShiftSwapApp));

  </script>
</body>
</html>
